name: CD - Deploy to WSL Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to WSL Server via Self-Hosted Runner
    runs-on: self-hosted

    steps:
      - name: Update repository and rebuild containers
        run: |
          cd /home/user/bunker-game-html
          git fetch origin
          git reset --hard origin/main
          docker compose down
          docker compose up -d --build
